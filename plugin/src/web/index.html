<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>brain — memory browser</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.2rem; color: #333; }
  #memories { list-style: none; padding: 0; }
  #memories li { padding: 0.5rem; margin: 0.25rem 0; background: #f5f5f5; border-radius: 4px; }
  #memories li .meta { font-size: 0.8rem; color: #666; }
  #search { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
</style>
</head>
<body>
<h1>brain memory browser</h1>
<input id="search" type="text" placeholder="Search memories..." />
<ul id="memories"></ul>
<script>
  const memoriesEl = document.getElementById('memories');
  const searchEl = document.getElementById('search');

  async function loadMemories(query) {
    const url = query ? `/api/search?q=${encodeURIComponent(query)}` : '/api/memories';
    const res = await fetch(url);
    const data = await res.json();
    memoriesEl.innerHTML = '';
    const items = data.memories || data.results || [];
    for (const item of items) {
      const li = document.createElement('li');
      const content = item.content || item.memory || '';
      const tags = item.tags ? item.tags.join(', ') : '';
      li.innerHTML = `<div>${escapeHtml(content.substring(0, 200))}</div>
        <div class="meta">${item.id || ''} ${tags ? '— ' + tags : ''}</div>`;
      memoriesEl.appendChild(li);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  let debounceTimer;
  searchEl.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadMemories(searchEl.value), 300);
  });

  loadMemories('');
</script>
</body>
</html>
